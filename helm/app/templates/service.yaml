{{- $services := list "api" "frontend" -}}
{{- range $services -}}{{- $cfg := index $.Values . -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" (include "k8s-eks-platform.fullname" $) . }}
  namespace: {{ $.Release.Namespace }}
  labels: {{- include "k8s-eks-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ . }}
spec:
  type: {{ $cfg.service.type }}
  selector: {{- include "k8s-eks-platform.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ . }}
  ports:
    - port: {{ $cfg.service.port }}
      targetPort: {{ $cfg.service.port }}
      protocol: TCP
      name: http
{{- end }}
