{{- if .Values.ingress.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "k8s-eks-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-eks-platform.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-api" (include "k8s-eks-platform.fullname" .) }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-frontend" (include "k8s-eks-platform.fullname" .) }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
