name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: "Image tag to deploy (leave blank to use commit SHA)"
        required: false

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

permissions:
  id-token: write   # Required for OIDC auth with AWS
  contents: read

jobs:
  # ── Build & Push Docker images ────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend]
    outputs:
      api_image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/k8s-eks-platform/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform Apply ───────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: ${{ env.ENVIRONMENT }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=k8s-eks-platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="cluster_name=${{ env.CLUSTER_NAME }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="tf_state_lock_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ── Helm Deploy ───────────────────────────────────────────────────────────
  helm-deploy:
    name: Helm Deploy → ${{ needs.terraform-apply.result == 'success' && env.ENVIRONMENT || 'skipped' }}
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    environment: ${{ env.ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm upgrade / install
        run: |
          helm upgrade --install k8s-eks-platform helm/app \
            --namespace app \
            --create-namespace \
            --values helm/app/values.yaml \
            --values helm/app/values.${{ env.ENVIRONMENT }}.yaml \
            --set global.imageTag=${{ env.IMAGE_TAG }} \
            --set global.environment=${{ env.ENVIRONMENT }} \
            --set global.awsRegion=${{ env.AWS_REGION }} \
            --set api.image.repository=${{ env.ECR_REGISTRY }}/k8s-eks-platform/api \
            --set frontend.image.repository=${{ env.ECR_REGISTRY }}/k8s-eks-platform/frontend \
            --set serviceAccount.irsaRoleArn=${{ secrets.IRSA_ROLE_ARN }} \
            --set ingress.host=${{ vars.APP_HOST }} \
            --atomic \
            --cleanup-on-fail \
            --timeout 5m \
            --wait

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for pods to be ready..."
          kubectl rollout status deployment -n app --timeout=3m
          echo "All deployments rolled out successfully ✔"

  # ── Notify ────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-push, terraform-apply, helm-deploy]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "::error::CD pipeline failed for ${{ env.ENVIRONMENT }} (SHA: ${{ github.sha }})"
          echo "Check the Actions run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
